name: Build & Release

# Builds Prosper.app from this repo at the pushed v* tag, signs the archive with
# Sparkle's EdDSA key, notarizes it, generates an appcast, and publishes a GitHub
# Release. The in-app updater (Sparkle) polls this repo's appcast.xml and offers
# new versions.
#
# Trigger: pushing a v* tag (scripts/release.sh does this). Manual re-runs:
# workflow_dispatch with the tag to (re)build.
#
# Required repository secrets:
#   SPARKLE_PRIVATE_KEY  — EdDSA private key from Sparkle's generate_keys. Unset →
#                          appcast published UNSIGNED (clients reject it).
#
# Code signing + notarization (set all five for prompt-free, notarized releases):
#   MACOS_SIGN_CERT_P12  — base64 of the "Developer ID Application" cert+key .p12.
#   MACOS_SIGN_CERT_PWD  — password protecting that .p12.
#   MACOS_PROVISION_PROFILE_B64 — base64 of the Developer ID provisioning profile
#                          for App ID eu.illegible.prosper WITH the Keychain Sharing
#                          capability. Required for the keychain-access-groups
#                          entitlement → iCloud-Keychain settings sync. Unset →
#                          app still notarizes, but the sync key stays on-device.
#   NOTARY_API_KEY_P8    — base64 of the App Store Connect API key (.p8) for
#                          notarytool. Unset (with a Developer ID cert present) →
#                          app is Developer ID-signed but NOT notarized/stapled.
#   NOTARY_API_KEY_ID    — the API key's Key ID (10 chars).
#   NOTARY_API_ISSUER_ID — the API key's Issuer ID (UUID).
#
#   With no cert secrets set, the build falls back to ad-hoc signing (TCC grants
#   reset each update; first launch shows the Gatekeeper dialog).
# Optional:
#   HOMEBREW_TAP_TOKEN   — PAT with repo write on the Homebrew tap (cask auto-bump).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "existing v* tag to (re)build (e.g. v2.90.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    # macos-15 ships Xcode 16.3/16.4 (Swift 6.1+); macos-14 tops out at Swift
    # 6.0, which can't resolve mlx-swift-lm (requires tools version 6.1).
    runs-on: macos-15
    steps:
      - name: Resolve version
        id: ver
        env:
          REF_IN: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Tag push → github.ref_name is the tag; manual dispatch → inputs.tag.
          TAG="${REF_IN:-$REF_NAME}"
          if [[ -z "${TAG}" || "${TAG}" != v* ]]; then echo "::error::no v* tag to build (got '${TAG}')"; exit 1; fi
          VERSION="${TAG#v}"
          # A pre-release is any version carrying a SemVer pre-release suffix
          # (e.g. "2.83.0-beta.1") → GitHub pre-release + Sparkle `beta` channel.
          if [[ "${VERSION}" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${VERSION} tag=${TAG} prerelease=${PRERELEASE}"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - name: Select Xcode 16 (Swift 6 toolchain)
        id: xcode
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app /Applications/Xcode_2*.app 2>/dev/null | sort -V | tail -n1)
          if [[ -z "$XC" ]]; then
            echo "::error::No Xcode 16+ found on runner"; ls -d /Applications/Xcode_*.app; exit 1
          fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          swift --version
          # Toolchain fingerprint so the build cache busts on any Swift/Xcode change.
          TC=$(swift --version 2>/dev/null | tr -d ' \n' | shasum -a 256 | cut -c1-12)
          echo "toolchain=$TC" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM build + dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # app/.build holds checked-out dep sources + compiled artifacts; the
          # swiftpm caches hold the global dependency/manifest cache. Key + path +
          # restore-keys MUST stay byte-identical to cache-warm.yml so dispatched
          # runs restore the cache the warmer saved under the main scope.
          path: |
            app/.build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.toolchain }}-${{ hashFiles('app/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.toolchain }}-
            spm-${{ runner.os }}-

      - name: Build (release)
        run: |
          # scripts/build.sh runs `swift build -c release` AND compiles MLX's Metal shaders.
          ./scripts/build.sh release

      - name: Import code-signing certificate
        # With MACOS_SIGN_CERT_P12 + MACOS_SIGN_CERT_PWD set, import the "Developer
        # ID Application" cert into a throwaway keychain and export
        # PROSPER_SIGN_IDENTITY (the full common name, incl. "(TEAMID)") so bundle.sh
        # takes its Developer-ID path: Hardened Runtime + timestamp + entitlements,
        # i.e. a notarizable bundle. macOS also keys TCC grants to the signature, so
        # a stable identity keeps Accessibility/Input-Monitoring across updates.
        # Unset → bundle.sh falls back to ad-hoc signing (grant resets each update,
        # not notarizable).
        env:
          CERT_P12: ${{ secrets.MACOS_SIGN_CERT_P12 }}
          CERT_PWD: ${{ secrets.MACOS_SIGN_CERT_PWD }}
        run: |
          if [[ -z "${CERT_P12}" ]]; then
            echo "::warning::MACOS_SIGN_CERT_P12 not set — bundling with ad-hoc signature (not notarizable; TCC grants reset on update)."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/prosper-signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "${CERT_P12}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "${CERT_PWD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          # Sign by the full common name so a single Team's cert is unambiguous and
          # bundle.sh can parse the trailing (TEAMID) for the entitlements stamp.
          IDENT=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | sed -nE 's/.*"(Developer ID Application:[^"]+)".*/\1/p' | head -n1)
          if [[ -z "$IDENT" ]]; then
            echo "::error::No 'Developer ID Application' identity found in imported keychain."
            security find-identity -v -p codesigning "$KEYCHAIN" || true
            exit 1
          fi
          echo "Imported signing identity: $IDENT"
          echo "PROSPER_SIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Stage provisioning profile
        # bundle.sh embeds scripts/embedded.provisionprofile (gitignored, so absent
        # from the checkout) to authorize the restricted keychain-access-groups
        # entitlement → iCloud-Keychain settings sync. Without it the app still
        # notarizes, just with the sync key pinned to the local device.
        env:
          PROFILE_B64: ${{ secrets.MACOS_PROVISION_PROFILE_B64 }}
        run: |
          if [[ -z "${PROFILE_B64}" ]]; then
            echo "::warning::MACOS_PROVISION_PROFILE_B64 not set — bundling without keychain-access-groups (settings-sync key stays on-device)."
            exit 0
          fi
          echo "${PROFILE_B64}" | base64 --decode > scripts/embedded.provisionprofile
          echo "Staged scripts/embedded.provisionprofile ($(wc -c < scripts/embedded.provisionprofile) bytes)."

      - name: Build dch (Remote Terminal binary to embed)
        # bundle.sh embeds $ROOT/../dch/dch into Resources so Remote Terminal works
        # with zero user install. The runner has no sibling clone, so fetch + build
        # it here. dch is a public C/autotools repo. Build fails loudly (bundle.sh
        # only warns), and we pin the same tag-less HEAD of main.
        run: |
          git clone --depth 1 https://github.com/ventsislav-georgiev/dch.git "$GITHUB_WORKSPACE/../dch"
          ( cd "$GITHUB_WORKSPACE/../dch" && ./configure && make )
          test -x "$GITHUB_WORKSPACE/../dch/dch" || { echo "::error::dch did not build"; exit 1; }

      - name: Bundle Prosper.app
        env:
          PROSPER_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          ./scripts/bundle.sh release
          # bundle.sh only warns (to suppressed stderr) if dch is missing — assert
          # it actually embedded so a broken Remote Terminal can't ship silently.
          test -x dist/Prosper.app/Contents/Resources/dch \
            || { echo "::error::dch was not embedded into the bundle"; exit 1; }
          echo "Bundle succeeded → dist/Prosper.app (dch embedded)"

      - name: Notarize + staple
        # Submit the Developer ID-signed bundle to Apple's notary service, then
        # staple the ticket so Gatekeeper validates OFFLINE on first launch. Runs
        # BEFORE zipping so the released archive (and its Sparkle EdDSA signature +
        # Homebrew sha256) covers the stapled .app. Skipped unless BOTH a Developer
        # ID cert (PROSPER_SIGN_IDENTITY) and the notarytool API key are present.
        env:
          KEY_P8: ${{ secrets.NOTARY_API_KEY_P8 }}
          KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
        run: |
          if [[ -z "${PROSPER_SIGN_IDENTITY:-}" ]]; then
            echo "::warning::Ad-hoc build — skipping notarization."
            exit 0
          fi
          if [[ -z "${KEY_P8}" || -z "${KEY_ID}" || -z "${ISSUER_ID}" ]]; then
            echo "::warning::NOTARY_API_KEY_* not set — bundle is Developer ID-signed but NOT notarized (first launch shows the Gatekeeper dialog)."
            exit 0
          fi
          APP="dist/Prosper.app"
          # Preflight: confirm bundle.sh produced a Developer ID + hardened-runtime
          # seal before spending a notary round-trip.
          SIGNINFO=$(codesign -dvvv "$APP" 2>&1 || true)
          if ! grep -q "Authority=Developer ID Application" <<< "$SIGNINFO"; then
            echo "::error::$APP is not Developer ID-signed — check the Import certificate step."; exit 1
          fi
          if ! grep -q "flags=.*runtime" <<< "$SIGNINFO"; then
            echo "::error::$APP lacks the Hardened Runtime — bundle.sh did not take the notarize path."; exit 1
          fi
          KEYFILE="$RUNNER_TEMP/notary_key.p8"
          echo "${KEY_P8}" | base64 --decode > "$KEYFILE"
          ZIP="$RUNNER_TEMP/notarize.zip"
          /usr/bin/ditto -c -k --keepParent "$APP" "$ZIP"
          echo "Submitting to Apple notary — may take a few minutes …"
          xcrun notarytool submit "$ZIP" \
            --key "$KEYFILE" --key-id "${KEY_ID}" --issuer "${ISSUER_ID}" --wait
          rm -f "$KEYFILE"
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          spctl -a -vvv --type exec "$APP"
          echo "Notarized + stapled $APP"

      - name: Zip the app
        id: zip
        run: |
          mkdir -p dist
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Prosper.app "Prosper-${{ steps.ver.outputs.version }}.zip"
          echo "zip=dist/Prosper-${{ steps.ver.outputs.version }}.zip" >> "$GITHUB_OUTPUT"

      - name: Fetch Sparkle signing tools
        run: |
          SPARKLE_VERSION=2.6.4
          curl -L -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle-tools
          tar -xf sparkle.tar.xz -C sparkle-tools

      - name: Sign update + generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          IS_PRERELEASE: ${{ steps.ver.outputs.is_prerelease }}
        run: |
          BIN=$(find sparkle-tools -name sign_update -type f | head -n1)
          GEN=$(find sparkle-tools -name generate_appcast -type f | head -n1)
          # Enclosure URLs point at THIS release's own asset (releases/download/<tag>/)
          # rather than the moving "latest" path. ${GITHUB_REPOSITORY} is this repo,
          # so update URLs resolve here.
          DL_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"
          CHANNEL_ARGS=()
          if [[ "${IS_PRERELEASE}" == "true" ]]; then CHANNEL_ARGS=(--channel beta); fi
          if [[ -n "${SPARKLE_PRIVATE_KEY}" && -n "${GEN}" ]]; then
            printf '%s' "${SPARKLE_PRIVATE_KEY}" > eddsa_priv.pem
            "${GEN}" --ed-key-file eddsa_priv.pem \
              --download-url-prefix "${DL_PREFIX}" \
              "${CHANNEL_ARGS[@]}" \
              dist/
            rm -f eddsa_priv.pem
          else
            echo "::warning::SPARKLE_PRIVATE_KEY not set or tools missing — publishing unsigned appcast."
            CHANNEL_TAG=""
            if [[ "${IS_PRERELEASE}" == "true" ]]; then CHANNEL_TAG="<sparkle:channel>beta</sparkle:channel>"; fi
            cat > dist/appcast.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Prosper</title>
              <item>
                <title>${VERSION}</title>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                ${CHANNEL_TAG}
                <enclosure url="${DL_PREFIX}Prosper-${VERSION}.zip" sparkle:os="macos" type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          XML
          fi
          # Fold this build into the canonical feed (the appcast GitHub serves as
          # "latest") so it keeps BOTH the newest stable and newest beta item.
          curl -fsSL -o canonical.xml \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml" || true
          python3 scripts/merge_appcast.py canonical.xml dist/appcast.xml dist/appcast.xml
          echo "Final appcast:"; cat dist/appcast.xml

      - name: Compose release notes from CHANGELOG
        # Pull the section for this version out of CHANGELOG.md (heading `## vX.Y.Z`,
        # up to the next `## `) and use it as the Release body. The auto-generated
        # commit list is appended below it by generate_release_notes. If CHANGELOG.md
        # has no matching section the file is left empty → notes fall back to the
        # auto-generated list alone, so a missing entry never blocks a release.
        id: notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          NOTES="$RUNNER_TEMP/notes.md"
          : > "$NOTES"
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$VERSION" '
              /^## / { if (cap) exit; if (index($0, "v" ver) > 0) { cap=1; next } }
              cap { print }
            ' CHANGELOG.md | sed -e '/./,$!d' > "$NOTES"
          fi
          if [[ -s "$NOTES" ]]; then
            echo "Using CHANGELOG.md section for v${VERSION}:"; cat "$NOTES"
          else
            echo "::warning::No CHANGELOG.md section for v${VERSION} — using auto-generated notes only."
          fi
          echo "file=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Prosper ${{ steps.ver.outputs.version }}
          body_path: ${{ steps.notes.outputs.file }}
          generate_release_notes: true
          prerelease: ${{ steps.ver.outputs.is_prerelease == 'true' }}
          files: |
            dist/Prosper-${{ steps.ver.outputs.version }}.zip
            dist/appcast.xml

      - name: Update stable feed with beta item
        # A beta release is NOT "latest", so the feed at releases/latest/download/
        # appcast.xml (which every installed client polls) wouldn't pick it up.
        # Re-attach the merged appcast to the current latest STABLE release so
        # opted-in beta users receive the build via the same feed URL.
        if: ${{ steps.ver.outputs.is_prerelease == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STABLE=$(gh release list --exclude-pre-releases -L 1 \
            --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [[ -z "${STABLE}" ]]; then
            STABLE=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
          fi
          if [[ -n "${STABLE}" ]]; then
            gh release upload "${STABLE}" dist/appcast.xml --clobber
            echo "Updated stable feed (${STABLE}) to include beta ${{ steps.ver.outputs.version }}."
          else
            echo "::warning::No stable release found to host the beta appcast — beta users won't see it via the latest feed until a stable release exists."
          fi

      - name: Update Homebrew cask
        # Stable releases only — never bump the public cask to a pre-release.
        if: ${{ steps.ver.outputs.is_prerelease == 'false' }}
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          ZIP: ${{ steps.zip.outputs.zip }}
        run: |
          # Bump the canonical cask in ventsislav-georgiev/homebrew-tap to this
          # release: rewrite only the version + sha256 lines. Requires
          # HOMEBREW_TAP_TOKEN (PAT with repo write on the tap); skipped if unset.
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew cask publish."
            exit 0
          fi
          SHA=$(shasum -a 256 "${ZIP}" | awk '{print $1}')
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/homebrew-tap.git" tap
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" tap/Casks/prosper.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/"     tap/Casks/prosper.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/prosper.rb
          if git diff --cached --quiet; then
            echo "cask already at ${VERSION}; nothing to push."
          else
            git commit -m "prosper ${VERSION}"
            git push
          fi
