name: Build & Release

# Builds Prosper.app from the PRIVATE source repo (ventsislav-georgiev/prosper-base),
# signs the archive with Sparkle's EdDSA key, generates an appcast, and publishes a
# GitHub Release HERE (the public repo). The in-app updater (Sparkle) polls this
# repo's appcast.xml and offers new versions.
#
# ─────────────────────────────────────────────────────────────────────────────
# WHY workflow_dispatch (NOT a tag trigger):
#   The build must NOT be triggered by mirroring a git tag from prosper-base into
#   this repo — pushing a tag pushes the COMMIT OBJECT it points to, which is a
#   prosper-base commit, and git then uploads the entire private source tree+history
#   to this public repo to satisfy the ref. That is a source leak. Instead,
#   scripts/release.sh in prosper-base calls `gh workflow run` with the source ref
#   as an INPUT. No git object ever crosses into this repo. The release tag is
#   created at publish time by softprops, pointing at THIS repo's commit.
#
# SOURCE PROTECTION:
#   • Dispatch-only + repo-gated → only someone with write access to THIS repo can
#     run it; forks no-op. There is no pull_request trigger, so fork PRs (which get
#     no secrets) can never run it with the token.
#   • Source is cloned with actions/checkout + persist-credentials:false → the
#     read-only SOURCE_REPO_TOKEN is never written to disk/git config; GitHub masks
#     it in logs.
#   • build/bundle stdout+stderr are redirected to a NON-uploaded log → public
#     Actions logs never show source file names or snippets. Only release ASSETS
#     (Prosper-<v>.zip, appcast.xml) leave the runner; the source archive never does.
# ─────────────────────────────────────────────────────────────────────────────
#
# Required repository secrets (set on THIS repo):
#   SOURCE_REPO_TOKEN    — fine-grained PAT, READ-ONLY "Contents" on prosper-base ONLY.
#   SPARKLE_PRIVATE_KEY  — EdDSA private key from Sparkle's generate_keys. Unset →
#                          appcast published UNSIGNED (clients reject it).
# Optional:
#   MACOS_SIGN_CERT_P12 / MACOS_SIGN_CERT_PWD — base64 .p12 + password for a stable
#                          code-signing identity (keeps TCC grants across updates).
#   HOMEBREW_TAP_TOKEN   — PAT with repo write on the Homebrew tap (cask auto-bump).

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "prosper-base ref to build (e.g. v2.83.0)"
        required: true
      version:
        description: "version without leading v (e.g. 2.83.0); defaults from source_ref"
        required: false

env:
  SOURCE_REPO: ventsislav-georgiev/prosper-base

permissions:
  contents: write

jobs:
  release:
    # Gate to this repo so a fork enabling Actions can't run the pipeline.
    if: ${{ github.repository == 'ventsislav-georgiev/prosper' }}
    # macos-15 ships Xcode 16.3/16.4 (Swift 6.1+); macos-14 tops out at Swift
    # 6.0, which can't resolve mlx-swift-lm (requires tools version 6.1).
    runs-on: macos-15
    steps:
      - name: Resolve version
        id: ver
        env:
          SRC_REF: ${{ inputs.source_ref }}
          VER_IN: ${{ inputs.version }}
        run: |
          if [[ -z "${SRC_REF}" ]]; then echo "::error::source_ref is required"; exit 1; fi
          if [[ -n "${VER_IN}" ]]; then VERSION="${VER_IN}"; else VERSION="${SRC_REF#v}"; fi
          TAG="v${VERSION}"
          # A pre-release is any version carrying a SemVer pre-release suffix
          # (e.g. "2.83.0-beta.1") → GitHub pre-release + Sparkle `beta` channel.
          if [[ "${VERSION}" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "src_ref=${SRC_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${VERSION} tag=${TAG} prerelease=${PRERELEASE} src_ref=${SRC_REF}"

      - name: Checkout source (private)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ steps.ver.outputs.src_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source
          # Do NOT persist the token into source/.git/config — keeps it out of
          # reach of every later build step and out of any git remote URL.
          persist-credentials: false

      - name: Select Xcode 16 (Swift 6 toolchain)
        id: xcode
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app /Applications/Xcode_2*.app 2>/dev/null | sort -V | tail -n1)
          if [[ -z "$XC" ]]; then
            echo "::error::No Xcode 16+ found on runner"; ls -d /Applications/Xcode_*.app; exit 1
          fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          swift --version
          # Toolchain fingerprint so the build cache busts on any Swift/Xcode change.
          TC=$(swift --version 2>/dev/null | tr -d ' \n' | shasum -a 256 | cut -c1-12)
          echo "toolchain=$TC" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM build + dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # source/app/.build holds checked-out dep sources + compiled artifacts;
          # the swiftpm caches hold the global dependency/manifest cache. Key + path
          # + restore-keys MUST stay byte-identical to cache-warm.yml so dispatched
          # runs restore the cache the warmer saved under the main scope.
          path: |
            source/app/.build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.toolchain }}-${{ hashFiles('source/app/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.toolchain }}-
            spm-${{ runner.os }}-

      - name: Build (release)
        working-directory: source
        run: |
          # scripts/build.sh runs `swift build -c release` AND compiles MLX's Metal
          # shaders. Output is redirected to a NON-uploaded log so the public Actions
          # log never shows source file names or code snippets from warnings/errors.
          # To debug a build failure, reproduce locally in the prosper-base repo.
          set -o pipefail
          if ! ./scripts/build.sh release > "$RUNNER_TEMP/build.log" 2>&1; then
            echo "::error::Build failed. Logs withheld (would expose private source). Reproduce in prosper-base."
            exit 1
          fi
          echo "Build succeeded."

      - name: Import code-signing certificate
        # Optional. With MACOS_SIGN_CERT_P12 + MACOS_SIGN_CERT_PWD set, import the
        # cert into a throwaway keychain and export PROSPER_SIGN_IDENTITY so bundle.sh
        # signs with a STABLE identity — macOS keys TCC grants to the signature, so a
        # stable identity lets users keep Accessibility/Input-Monitoring across updates.
        # Unset → bundle.sh falls back to ad-hoc signing (grant resets each update).
        env:
          CERT_P12: ${{ secrets.MACOS_SIGN_CERT_P12 }}
          CERT_PWD: ${{ secrets.MACOS_SIGN_CERT_PWD }}
        run: |
          if [[ -z "${CERT_P12}" ]]; then
            echo "::warning::MACOS_SIGN_CERT_P12 not set — bundling with ad-hoc signature (TCC grants reset on update)."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/prosper-signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "${CERT_P12}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "${CERT_PWD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          IDENT=$(security find-identity -p codesigning "$KEYCHAIN" \
            | awk '/Prosper Self-Signed/ {print $2; exit}')
          if [[ -z "$IDENT" ]]; then
            echo "::error::No code-signing identity found in imported keychain."
            security find-identity -p codesigning "$KEYCHAIN" || true
            exit 1
          fi
          echo "Imported signing identity: $IDENT (Prosper Self-Signed)"
          echo "PROSPER_SIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"

      - name: Bundle Prosper.app
        working-directory: source
        env:
          PROSPER_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -o pipefail
          if ! ./scripts/bundle.sh release > "$RUNNER_TEMP/bundle.log" 2>&1; then
            echo "::error::Bundle failed. Logs withheld (would expose private source). Reproduce in prosper-base."
            exit 1
          fi
          echo "Bundle succeeded → source/dist/Prosper.app"

      - name: Zip the app
        id: zip
        working-directory: source
        run: |
          mkdir -p dist
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Prosper.app "Prosper-${{ steps.ver.outputs.version }}.zip"
          echo "zip=source/dist/Prosper-${{ steps.ver.outputs.version }}.zip" >> "$GITHUB_OUTPUT"

      - name: Fetch Sparkle signing tools
        working-directory: source
        run: |
          SPARKLE_VERSION=2.6.4
          curl -L -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle-tools
          tar -xf sparkle.tar.xz -C sparkle-tools

      - name: Sign update + generate appcast
        working-directory: source
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          IS_PRERELEASE: ${{ steps.ver.outputs.is_prerelease }}
        run: |
          BIN=$(find sparkle-tools -name sign_update -type f | head -n1)
          GEN=$(find sparkle-tools -name generate_appcast -type f | head -n1)
          # Enclosure URLs point at THIS release's own asset (releases/download/<tag>/)
          # rather than the moving "latest" path. ${GITHUB_REPOSITORY} is THIS public
          # repo, so update URLs resolve here.
          DL_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"
          CHANNEL_ARGS=()
          if [[ "${IS_PRERELEASE}" == "true" ]]; then CHANNEL_ARGS=(--channel beta); fi
          if [[ -n "${SPARKLE_PRIVATE_KEY}" && -n "${GEN}" ]]; then
            printf '%s' "${SPARKLE_PRIVATE_KEY}" > eddsa_priv.pem
            "${GEN}" --ed-key-file eddsa_priv.pem \
              --download-url-prefix "${DL_PREFIX}" \
              "${CHANNEL_ARGS[@]}" \
              dist/
            rm -f eddsa_priv.pem
          else
            echo "::warning::SPARKLE_PRIVATE_KEY not set or tools missing — publishing unsigned appcast."
            CHANNEL_TAG=""
            if [[ "${IS_PRERELEASE}" == "true" ]]; then CHANNEL_TAG="<sparkle:channel>beta</sparkle:channel>"; fi
            cat > dist/appcast.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Prosper</title>
              <item>
                <title>${VERSION}</title>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                ${CHANNEL_TAG}
                <enclosure url="${DL_PREFIX}Prosper-${VERSION}.zip" sparkle:os="macos" type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          XML
          fi
          # Fold this build into the canonical feed (the appcast GitHub serves as
          # "latest") so it keeps BOTH the newest stable and newest beta item.
          curl -fsSL -o canonical.xml \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml" || true
          python3 scripts/merge_appcast.py canonical.xml dist/appcast.xml dist/appcast.xml
          echo "Final appcast:"; cat dist/appcast.xml

      - name: Publish GitHub Release
        # Creates the release + tag ON THIS public repo, pointing at this repo's
        # dispatched commit (github.sha) — NOT any prosper-base object.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Prosper ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.ver.outputs.is_prerelease == 'true' }}
          files: |
            source/dist/Prosper-${{ steps.ver.outputs.version }}.zip
            source/dist/appcast.xml

      - name: Update stable feed with beta item
        # A beta release is NOT "latest", so the feed at releases/latest/download/
        # appcast.xml (which every installed client polls) wouldn't pick it up.
        # Re-attach the merged appcast to the current latest STABLE release so
        # opted-in beta users receive the build via the same feed URL.
        if: ${{ steps.ver.outputs.is_prerelease == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STABLE=$(gh release list --exclude-pre-releases -L 1 \
            --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [[ -z "${STABLE}" ]]; then
            STABLE=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
          fi
          if [[ -n "${STABLE}" ]]; then
            gh release upload "${STABLE}" source/dist/appcast.xml --clobber
            echo "Updated stable feed (${STABLE}) to include beta ${{ steps.ver.outputs.version }}."
          else
            echo "::warning::No stable release found to host the beta appcast — beta users won't see it via the latest feed until a stable release exists."
          fi

      - name: Update Homebrew cask
        # Stable releases only — never bump the public cask to a pre-release.
        if: ${{ steps.ver.outputs.is_prerelease == 'false' }}
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          ZIP: ${{ steps.zip.outputs.zip }}
        run: |
          # Bump the canonical cask in ventsislav-georgiev/homebrew-tap to this
          # release: rewrite only the version + sha256 lines. Requires
          # HOMEBREW_TAP_TOKEN (PAT with repo write on the tap); skipped if unset.
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew cask publish."
            exit 0
          fi
          SHA=$(shasum -a 256 "${ZIP}" | awk '{print $1}')
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/homebrew-tap.git" tap
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" tap/Casks/prosper.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/"     tap/Casks/prosper.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/prosper.rb
          if git diff --cached --quiet; then
            echo "cask already at ${VERSION}; nothing to push."
          else
            git commit -m "prosper ${VERSION}"
            git push
          fi
