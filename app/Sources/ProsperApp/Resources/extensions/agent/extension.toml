[extension]
id          = "com.prosper.agent"
name        = "agent"
title       = "Coding Agent"
description = "Send a goal to the local coding agent, running in a chosen repository."
version     = "1.1.0"
author      = "prosper"
license     = "MIT"
icon        = "sparkles"
system      = true

[extension.host]
min_version = "2.0.0"
api_level   = 1

[extension.entry]
main = "init.lua"

[extension.activation]
on_event = []
eager    = false

# Runner-mode command. `g ` locks the launcher into agent mode; the whole query
# becomes the goal. Drives host.agent, which opens the Coding Agent chat window —
# so it is a window launcher (`launches_window`): the runner dismisses on commit
# and the chat window takes over (otherwise the runner stays on top of it).
[[contributes.commands]]
id          = "agent.run"
title       = "Coding Agent"
description = "Run the typed text as a goal for the local coding agent"
mode        = "no-view"
launches_window = true
icon        = "sparkles"
keywords    = ["agent", "code", "coding", "fix", "goal", "qwen", "codex"]
prefix      = "g "

[[contributes.settings]]
key         = "repo"
title       = "Repository path"
type        = "path"
default     = "~"
description = "Working directory the coding agent runs in."
