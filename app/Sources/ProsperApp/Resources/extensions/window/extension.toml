# Window Management — move/resize the focused window into halves, quarters,
# thirds, maximize, center, etc. Raycast-parity feature
# (https://www.raycast.com/core-features/window-management), implemented over
# the native host.window API (Accessibility — same permission as autocomplete).
[extension]
id          = "com.prosper.window"
name        = "window"
title       = "Window Management"
description = "Snap the focused window: halves, quarters, thirds, maximize, center."
version     = "1.1.0"
author      = "Prosper"
license     = "MIT"
system      = true
# Snapping the focused window goes through the AX window API (same grant as
# autocomplete). Surfaced in Settings › Extensions so the user can grant it here.
permissions = ["accessibility"]

[extension.host]
min_version = "2.0.0"
api_level   = 1

[extension.entry]
main = "init.lua"

# Single no-view command; the layout keyword follows the `win`/`window` verb.
# Runs on the off-main async lane (host.window bridges to the main thread).
[[contributes.commands]]
id          = "window.move"
title       = "Window"
description = "Snap the focused window. e.g. win left, win top-right, win max, win center."
mode        = "no-view"
keywords    = ["win", "window", "snap", "resize", "move", "maximize", "tile"]
match       = "^win(dow)?( |$)"

# Declarative (Tier-A) settings: the full Window Management page, rendered
# natively from this manifest — no Lua. `shortcut` controls bind 1:1 to the host
# ShortcutActions (the `name` is the action's rawValue); the recorder writes
# ShortcutStore and pokes onShortcutsChanged, which re-registers the Carbon
# hotkeys. A Permissions group below surfaces the Accessibility grant inline.
[[contributes.settings_sections]]
id        = "window"
title     = "Window Management"
icon      = "macwindow.on.rectangle"
accent    = "Window"
subtitle  = "Snap and resize the frontmost window with global shortcuts"

[[contributes.settings_sections.controls]]
kind   = "group"
title  = "Shortcuts (click to rebind)"
footer = "Snapping uses Accessibility — the same grant as autocomplete."

[[contributes.settings_sections.controls]]
kind = "shortcut"
name = "windowLeftHalf"

[[contributes.settings_sections.controls]]
kind = "shortcut"
name = "windowRightHalf"

[[contributes.settings_sections.controls]]
kind = "shortcut"
name = "windowTopHalf"

[[contributes.settings_sections.controls]]
kind = "shortcut"
name = "windowBottomHalf"

[[contributes.settings_sections.controls]]
kind = "shortcut"
name = "windowMaximize"

[[contributes.settings_sections.controls]]
kind = "shortcut"
name = "windowCenter"

[[contributes.settings_sections.controls]]
kind  = "group"
title = "Permissions"

[[contributes.settings_sections.controls]]
kind = "permission"
name = "accessibility"
