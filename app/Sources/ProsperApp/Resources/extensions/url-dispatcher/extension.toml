[extension]
id          = "com.prosper.url-dispatcher"
name        = "url-dispatcher"
title       = "URL Dispatcher"
description = "Routes opened links to different browsers by domain (§O). Make Prosper the default browser and every clicked link arrives as a `url.open` event; this extension picks the right browser and re-opens it there — a stateless port of finicky / Hammerspoon URL routing."
version     = "1.0.0"
author      = "prosper"
license     = "MIT"
icon        = "arrow.triangle.branch"
system      = true

[extension.host]
min_version = "2.0.0"
api_level   = 1

[extension.entry]
main = "init.lua"

# Every link opened while Prosper is the default browser is delivered here.
[[contributes.events]]
event   = "url.open"
handler = "on_url"

# Palette command to register Prosper as the system default http/https handler.
[[contributes.commands]]
id       = "url-dispatcher.make-default"
title    = "Make Prosper the Default Browser"
mode     = "no-view"
icon     = "checkmark.seal"
keywords = ["default", "browser", "url"]
