[extension]
id          = "com.prosper.url-dispatcher"
name        = "url-dispatcher"
title       = "URL Dispatcher"
description = "Routes opened links to different browsers by domain (§O). Make Prosper the default browser and every clicked link arrives as a `url.open` event; this extension picks the right browser and re-opens it there — a stateless port of finicky / Hammerspoon URL routing."
version     = "1.1.0"
author      = "prosper"
license     = "MIT"
icon        = "arrow.triangle.branch"
system      = true

[extension.host]
min_version = "2.0.0"
api_level   = 1

[extension.entry]
main = "init.lua"

# Every link opened while Prosper is the default browser is delivered here.
[[contributes.events]]
event   = "url.open"
handler = "on_url"

# Palette command to register Prosper as the system default http/https handler.
# launches_window surfaces it as a selectable launcher row that runs the handler
# on Enter (NOT per keystroke). Required for discovery: the launcher only lists
# commands with launches_window — a no-view command with just a `match` would
# re-run (re-set the default browser) on every keystroke, and one with neither is
# invisible (the "No results for Make Prosper the Default Browser" bug). The
# handler sets the default + shows an alert; it opens no actual window.
[[contributes.commands]]
id       = "url-dispatcher.make-default"
title    = "Make Prosper the Default Browser"
mode     = "no-view"
launches_window = true
icon     = "checkmark.seal"
keywords = ["default", "browser", "url"]
